<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CometCrusher: Rayon Betrayal</title>
    <style>
        body { margin: 0; background: #050510; overflow: hidden; color: #7fffd4; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; filter: drop-shadow(0 0 5px #00f2ff); }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; text-shadow: 0 0 5px #00f2ff; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>COMET CRUSHER</h1>
        <p>Score: <span id="score">0</span> | Lives: <span id="lives">3</span></p>
        <p>Freeze Charges [F]: <span id="freeze">0</span></p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const freezeEl = document.getElementById('freeze');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- Physics Constants ---
const FPS = 60;
const FRICTION = 0.99;
const SHIP_THRUST = 0.15;
const SHIP_TURN_SPEED = 360;
const BULLET_SPEED = 7;
const MAX_BULLETS = 10;
const ALIEN_SPEED = 1.6;

// --- Rayon Lore ---
const ANCIENT_ECHOES = [
    "The Rayons built the gates to catch the light.",
    "The Iron Star shrank, and the warmth fled.",
    "In the cold, our Sentinels recalibrated... and betrayed us.",
    "Betrayal is a cold equation. They chose the frost.",
    "You fly through the ribs of a ghost empire.",
    "The Sentinels guard a heat that no longer exists."
];

// --- Math Helpers ---
const toRad = (deg) => deg * Math.PI / 180;

class Vector {
    constructor(x, y) { this.x = x; this.y = y; }
    add(v) { this.x += v.x; this.y += v.y; }
    mult(n) { this.x *= n; this.y *= n; }
}

// --- Game Objects ---
let ship = {
    pos: new Vector(canvas.width / 2, canvas.height / 2),
    vel: new Vector(0, 0),
    r: 15,
    angle: 90,
    thrusting: false,
    rotating: 0,
    lives: 3
};

let bullets = [];
let comets = [];
let rings = [];
let aliens = [];
let score = 0;
let freezeCharges = 0;
let freezeTimer = 0; // Duration of active freeze
let currentMemory = { text: "The frost is coming...", alpha: 1.5 };
let lastAlienSpawn = Date.now();

function createComet(x, y, r) {
    return {
        pos: new Vector(x, y),
        vel: new Vector((Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3),
        r: r,
        vertices: Math.floor(Math.random() * 5 + 7),
        offsets: Array.from({length: 12}, () => Math.random() * 0.4 + 0.8)
    };
}

function spawnAlien() {
    aliens.push({
        pos: new Vector(Math.random() > 0.5 ? 0 : canvas.width, Math.random() * canvas.height),
        vel: new Vector(0, 0),
        r: 12,
        pulse: 0
    });
}

function spawnRing() {
    rings.push({ pos: new Vector(Math.random() * canvas.width, Math.random() * canvas.height), r: 50, pulse: 0 });
}

// Initial Setup
for (let i = 0; i < 5; i++) comets.push(createComet(Math.random() * canvas.width, Math.random() * canvas.height, 40));
spawnRing();

// --- Input Handling ---
window.onkeydown = (e) => {
    if (e.key === 'ArrowUp' || e.key === 'w') ship.thrusting = true;
    if (e.key === 'ArrowLeft' || e.key === 'a') ship.rotating = -1;
    if (e.key === 'ArrowRight' || e.key === 'd') ship.rotating = 1;
    if (e.key === ' ') shoot();
    if (e.key === 'f' || e.key === 'F') useFreeze();
};
window.onkeyup = (e) => {
    if (e.key === 'ArrowUp' || e.key === 'w') ship.thrusting = false;
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'a' || e.key === 'd') ship.rotating = 0;
};

function shoot() {
    if (bullets.length < MAX_BULLETS) {
        bullets.push({
            pos: new Vector(ship.pos.x, ship.pos.y),
            vel: new Vector(Math.cos(toRad(ship.angle)) * BULLET_SPEED, -Math.sin(toRad(ship.angle)) * BULLET_SPEED),
            life: 60
        });
    }
}

function useFreeze() {
    if (freezeCharges > 0 && freezeTimer <= 0) {
        freezeCharges--;
        freezeTimer = 180; // 3 seconds at 60fps
        freezeEl.innerText = freezeCharges;
    }
}

// --- Core Loop ---
function update() {
    // 1. Ship Physics
    ship.angle += ship.rotating * (SHIP_TURN_SPEED / FPS);
    if (ship.thrusting) {
        ship.vel.x += SHIP_THRUST * Math.cos(toRad(ship.angle));
        ship.vel.y -= SHIP_THRUST * Math.sin(toRad(ship.angle));
    }
    ship.vel.mult(FRICTION);
    ship.pos.add(ship.vel);

    if (freezeTimer > 0) freezeTimer--;

    // 2. Alien (Sentinel) AI
    if (Date.now() - lastAlienSpawn > 10000) { spawnAlien(); lastAlienSpawn = Date.now(); }
    
    aliens.forEach((a, ai) => {
        let dx = ship.pos.x - a.pos.x;
        let dy = ship.pos.y - a.pos.y;
        let dist = Math.hypot(dx, dy);

        if (freezeTimer <= 0) {
            a.vel.x = (dx / dist) * ALIEN_SPEED;
            a.vel.y = (dy / dist) * ALIEN_SPEED;
            a.pos.add(a.vel);
        }
        a.pulse += 0.1;

        if (dist < ship.r + a.r) {
            aliens.splice(ai, 1);
            ship.lives--;
            livesEl.innerText = ship.lives;
            if(ship.lives <= 0) { alert("THE ICE HAS CONSUMED YOU. SCORE: " + score); location.reload(); }
        }
    });

    // 3. Bullets vs Everything
    bullets.forEach((b, bi) => {
        b.pos.add(b.vel);
        b.life--;
        if (b.life <= 0) bullets.splice(bi, 1);

        aliens.forEach((a, ai) => {
            if (Math.hypot(b.pos.x - a.pos.x, b.pos.y - a.pos.y) < a.r) {
                bullets.splice(bi, 1);
                aliens.splice(ai, 1);
                score += 1000;
                scoreEl.innerText = score;
            }
        });
    });

    // 4. Comet Physics & Collision
    comets.forEach((c, ci) => {
        if (freezeTimer <= 0) c.pos.add(c.vel);
        bullets.forEach((b, bi) => {
            if (Math.hypot(b.pos.x - c.pos.x, b.pos.y - c.pos.y) < c.r) {
                bullets.splice(bi, 1);
                if (c.r > 15) {
                    comets.push(createComet(c.pos.x, c.pos.y, c.r / 2));
                    comets.push(createComet(c.pos.x, c.pos.y, c.r / 2));
                }
                comets.splice(ci, 1);
                score += 100;
                scoreEl.innerText = score;
            }
        });
    });

    // 5. Ring Collision & Powerup
    rings.forEach((r, ri) => {
        r.pulse += 0.05;
        if (Math.hypot(ship.pos.x - r.pos.x, ship.pos.y - r.pos.y) < r.r) {
            rings.splice(ri, 1);
            currentMemory.text = ANCIENT_ECHOES[Math.floor(Math.random() * ANCIENT_ECHOES.length)];
            currentMemory.alpha = 2.0;
            freezeCharges++;
            freezeEl.innerText = freezeCharges;
            score += 500;
            scoreEl.innerText = score;
            spawnRing();
        }
    });

    // 6. Screen Wrap
    [ship, ...bullets, ...comets, ...rings, ...aliens].forEach(obj => {
        if (obj.pos.x < 0) obj.pos.x = canvas.width;
        if (obj.pos.x > canvas.width) obj.pos.x = 0;
        if (obj.pos.y < 0) obj.pos.y = canvas.height;
        if (obj.pos.y > canvas.height) obj.pos.y = 0;
    });

    if (currentMemory.alpha > 0) currentMemory.alpha -= 0.005;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw Iron Star (Dead Sun)
    ctx.fillStyle = "#ff4444";
    ctx.beginPath();
    ctx.arc(canvas.width/2, canvas.height/2, 2, 0, Math.PI*2);
    ctx.fill();

    // Memory Text
    if (currentMemory.alpha > 0) {
        ctx.fillStyle = `rgba(127, 255, 212, ${Math.min(currentMemory.alpha, 1)})`;
        ctx.font = "italic 24px 'Courier New'"; ctx.textAlign = "center";
        ctx.fillText(currentMemory.text, canvas.width / 2, canvas.height / 2 + 100);
    }

    // Draw Aliens (Sentinels)
    aliens.forEach(a => {
        ctx.strokeStyle = freezeTimer > 0 ? '#44ffff' : '#ff0055';
        ctx.lineWidth = 2; ctx.beginPath();
        let s = a.r + Math.sin(a.pulse) * 3;
        ctx.moveTo(a.pos.x, a.pos.y - s); ctx.lineTo(a.pos.x + s, a.pos.y);
        ctx.lineTo(a.pos.x, a.pos.y + s); ctx.lineTo(a.pos.x - s, a.pos.y);
        ctx.closePath(); ctx.stroke();
    });

    // Draw Rings
    rings.forEach(r => {
        ctx.strokeStyle = `rgba(0, 242, 255, ${0.4 + Math.sin(r.pulse) * 0.2})`;
        ctx.lineWidth = 3; ctx.setLineDash([5, 15]);
        ctx.beginPath(); ctx.arc(r.pos.x, r.pos.y, r.r, 0, Math.PI * 2); ctx.stroke();
        ctx.setLineDash([]);
    });

    // Draw Ship
    ctx.strokeStyle = freezeTimer > 0 ? '#ffffff' : '#00f2ff';
    ctx.lineWidth = 2; ctx.beginPath();
    ctx.moveTo(ship.pos.x + 4/3 * ship.r * Math.cos(toRad(ship.angle)), ship.pos.y - 4/3 * ship.r * Math.sin(toRad(ship.angle)));
    ctx.lineTo(ship.pos.x - ship.r * (2/3 * Math.cos(toRad(ship.angle)) + Math.sin(toRad(ship.angle))), ship.pos.y + ship.r * (2/3 * Math.sin(toRad(ship.angle)) - Math.cos(toRad(ship.angle))));
    ctx.lineTo(ship.pos.x - ship.r * (2/3 * Math.cos(toRad(ship.angle)) - Math.sin(toRad(ship.angle))), ship.pos.y + ship.r * (2/3 * Math.sin(toRad(ship.angle)) + Math.cos(toRad(ship.angle))));
    ctx.closePath(); ctx.stroke();

    // Bullets & Comets
    ctx.fillStyle = '#ff00ff'; bullets.forEach(b => ctx.fillRect(b.pos.x, b.pos.y, 3, 3));
    ctx.strokeStyle = '#7fffd4';
    comets.forEach(c => {
        ctx.beginPath();
        for(let i=0; i<c.vertices; i++) {
            let a = i * Math.PI * 2 / c.vertices;
            let r = c.r * c.offsets[i];
            ctx.lineTo(c.pos.x + r * Math.cos(a), c.pos.y + r * Math.sin(a));
        }
        ctx.closePath(); ctx.stroke();
    });

    requestAnimationFrame(() => { update(); draw(); });
}

draw();
</script>
</body>
</html>
