<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CometCrusher Core</title>
    <style>
        body { margin: 0; background: #050510; overflow: hidden; color: #7fffd4; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; filter: drop-shadow(0 0 5px #00f2ff); }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>COMET CRUSHER</h1>
        <p>Score: <span id="score">0</span></p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- Physics Constants ---
const FPS = 60;
const FRICTION = 0.99; // Space friction
const SHIP_THRUST = 0.15;
const SHIP_TURN_SPEED = 360; // Degrees per second
const BULLET_SPEED = 7;
const MAX_BULLETS = 10;

// --- Math Helpers ---
const toRad = (deg) => deg * Math.PI / 180;

class Vector {
    constructor(x, y) { this.x = x; this.y = y; }
    add(v) { this.x += v.x; this.y += v.y; }
    mult(n) { this.x *= n; this.y *= n; }
}

// --- Game Objects ---
let ship = {
    pos: new Vector(canvas.width / 2, canvas.height / 2),
    vel: new Vector(0, 0),
    r: 15,
    angle: 90, // Degrees
    thrusting: false,
    rotating: 0 // -1 for left, 1 for right
};

let bullets = [];
let comets = [];
let score = 0;

function createComet(x, y, r) {
    return {
        pos: new Vector(x, y),
        vel: new Vector((Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3),
        r: r,
        vertices: Math.floor(Math.random() * 5 + 7), // Geometric "frozen" look
        offsets: Array.from({length: 12}, () => Math.random() * 0.4 + 0.8)
    };
}

// Initial Comets
for (let i = 0; i < 5; i++) {
    comets.push(createComet(Math.random() * canvas.width, Math.random() * canvas.height, 40));
}

// --- Input Handling ---
window.onkeydown = (e) => {
    if (e.key === 'ArrowUp' || e.key === 'w') ship.thrusting = true;
    if (e.key === 'ArrowLeft' || e.key === 'a') ship.rotating = -1;
    if (e.key === 'ArrowRight' || e.key === 'd') ship.rotating = 1;
    if (e.key === ' ') shoot();
};
window.onkeyup = (e) => {
    if (e.key === 'ArrowUp' || e.key === 'w') ship.thrusting = false;
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'a' || e.key === 'd') ship.rotating = 0;
};

function shoot() {
    if (bullets.length < MAX_BULLETS) {
        bullets.push({
            pos: new Vector(ship.pos.x, ship.pos.y),
            vel: new Vector(
                Math.cos(toRad(ship.angle)) * BULLET_SPEED,
                -Math.sin(toRad(ship.angle)) * BULLET_SPEED
            ),
            life: 60 // frames
        });
    }
}

// --- Core Loop ---
function update() {
    // 1. Rotation & Thrust
    ship.angle += ship.rotating * (SHIP_TURN_SPEED / FPS);
    if (ship.thrusting) {
        ship.vel.x += SHIP_THRUST * Math.cos(toRad(ship.angle));
        ship.vel.y -= SHIP_THRUST * Math.sin(toRad(ship.angle));
    }
    ship.vel.mult(FRICTION);
    ship.pos.add(ship.vel);

    // 2. Screen Wrap
    [ship, ...bullets, ...comets].forEach(obj => {
        if (obj.pos.x < 0) obj.pos.x = canvas.width;
        if (obj.pos.x > canvas.width) obj.pos.x = 0;
        if (obj.pos.y < 0) obj.pos.y = canvas.height;
        if (obj.pos.y > canvas.height) obj.pos.y = 0;
    });

    // 3. Bullets
    bullets.forEach((b, i) => {
        b.pos.add(b.vel);
        b.life--;
        if (b.life <= 0) bullets.splice(i, 1);
    });

    // 4. Comets & Collision
    comets.forEach((c, ci) => {
        c.pos.add(c.vel);
        
        // Bullet Collision (Euclidean Distance)
        bullets.forEach((b, bi) => {
            let dist = Math.hypot(b.pos.x - c.pos.x, b.pos.y - c.pos.y);
            if (dist < c.r) {
                bullets.splice(bi, 1);
                if (c.r > 15) {
                    comets.push(createComet(c.pos.x, c.pos.y, c.r / 2));
                    comets.push(createComet(c.pos.x, c.pos.y, c.r / 2));
                }
                comets.splice(ci, 1);
                score += 100;
                scoreEl.innerText = score;
            }
        });
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw Ship
    ctx.strokeStyle = '#00f2ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(
        ship.pos.x + 4/3 * ship.r * Math.cos(toRad(ship.angle)),
        ship.pos.y - 4/3 * ship.r * Math.sin(toRad(ship.angle))
    );
    ctx.lineTo(
        ship.pos.x - ship.r * (2/3 * Math.cos(toRad(ship.angle)) + Math.sin(toRad(ship.angle))),
        ship.pos.y + ship.r * (2/3 * Math.sin(toRad(ship.angle)) - Math.cos(toRad(ship.angle)))
    );
    ctx.lineTo(
        ship.pos.x - ship.r * (2/3 * Math.cos(toRad(ship.angle)) - Math.sin(toRad(ship.angle))),
        ship.pos.y + ship.r * (2/3 * Math.sin(toRad(ship.angle)) + Math.cos(toRad(ship.angle)))
    );
    ctx.closePath();
    ctx.stroke();

    // Draw Bullets
    ctx.fillStyle = '#ff00ff';
    bullets.forEach(b => ctx.fillRect(b.pos.x, b.pos.y, 3, 3));

    // Draw Comets
    ctx.strokeStyle = '#7fffd4';
    comets.forEach(c => {
        ctx.beginPath();
        for(let i=0; i<c.vertices; i++) {
            let a = i * Math.PI * 2 / c.vertices;
            let r = c.r * c.offsets[i];
            ctx.lineTo(c.pos.x + r * Math.cos(a), c.pos.y + r * Math.sin(a));
        }
        ctx.closePath();
        ctx.stroke();
    });

    requestAnimationFrame(() => {
        update();
        draw();
    });
}

draw();
</script>
</body>
</html>
